string">&quot;i&quot;</span>+i)   <span class="hljs-comment">//i=30，+=把左边和右边的数据做加法操作，结果赋值给左边</span><br><span class="hljs-built_in">short</span> s =<span class="hljs-number">10</span>;<br>s +=<span class="hljs-number">20</span>;      <span class="hljs-comment">//与s+(short)(s+20);等价，不与s = s+20等价</span><br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;s&quot;</span>+s)   <span class="hljs-comment">//结果为s30</span><br>a+=b  <span class="hljs-comment">//将a+b的值给a</span><br>a-=b  <span class="hljs-comment">//将a-b的值给a</span><br>a*=b  <span class="hljs-comment">//将a×b的值给a</span><br>a/=b  <span class="hljs-comment">//将a÷b的值给a</span><br>a%=b  <span class="hljs-comment">//将a÷b的余数给a</span><br>单独使用时i++和++i一样<br><span class="hljs-built_in">int</span> i=<span class="hljs-number">10</span><br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;i&quot;</span>+i);  <span class="hljs-comment">//结果为i10</span><br>i++;    <br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;i&quot;</span>+i);   <span class="hljs-comment">//结果为i11</span><br>参与操作时：++i和i++不同<br><span class="hljs-built_in">int</span> i=<span class="hljs-number">10</span>;<br><span class="hljs-built_in">int</span> j=i++;<br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;j&quot;</span>)  <span class="hljs-comment">//j=10</span><br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;i&quot;</span>)  <span class="hljs-comment">//i=11</span><br><br><span class="hljs-built_in">int</span> i=<span class="hljs-number">10</span>;<br><span class="hljs-built_in">int</span> j=++i;<br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;j&quot;</span>)  <span class="hljs-comment">//j=11</span><br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;i&quot;</span>)  <span class="hljs-comment">//i=11</span><br><br>&amp;或运算符，有<span class="hljs-literal">false</span>则<span class="hljs-literal">false</span><br>|或运算符,有<span class="hljs-literal">true</span>则<span class="hljs-literal">true</span><br>^亦或运算符,同为<span class="hljs-literal">false</span>不同ture<br>!非运算符,非<span class="hljs-literal">false</span>则<span class="hljs-literal">true</span>，非<span class="hljs-literal">true</span>则<span class="hljs-literal">false</span>，!可以叠加<br>&amp;&amp;短路与，如果左边真，右边执行，左边为假，右边不执行<br>||短路或，如果左边假，右边执行，左边为真，右边不执行<br><br>三元运算符:<br>格式关系表达式?表达式<span class="hljs-number">1</span>:表达式<span class="hljs-number">2</span><br>如果<span class="hljs-literal">true</span>，表达式<span class="hljs-number">1</span>为运算结果<br>如果flase，表达式<span class="hljs-number">2</span>为运算结果<br><span class="hljs-built_in">int</span> a=<span class="hljs-number">10</span>;<br><span class="hljs-built_in">int</span> b=<span class="hljs-number">20</span>;<br><span class="hljs-built_in">int</span> max=a&gt;b?a:b;   <span class="hljs-comment">//获取两个数据中较大值</span><br>System.<span class="hljs-keyword">out</span>.println(<span class="hljs-string">&quot;max:&quot;</span>+max);   <span class="hljs-comment">//结果为max:20</span><br><br></code></pre></td></tr></table></figure>
